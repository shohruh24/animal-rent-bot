<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Animal Rent • Каталог</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --gold: #f0a500;
            --gold2: #ffc107;
            --white: #ffffff;
            --gray: #9e9e9e;
            --green: #25D366;
            --blue: #0088cc;
            --red: #ff4757;
            --radius: 20px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== ANIMATION ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(240, 165, 0, 0.3); }
            50% { box-shadow: 0 0 40px rgba(240, 165, 0, 0.6); }
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 24px 20px 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header-logo {
            font-size: 56px;
            animation: float 3s ease-in-out infinite;
            display: block;
        }

        .header-title {
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--gold2), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .header-subtitle {
            font-size: 12px;
            color: var(--gray);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 16px 10px;
            background: var(--card);
            margin: 16px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 22px;
            font-weight: 800;
            color: var(--gold);
        }

        .stat-label {
            font-size: 10px;
            color: var(--gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        /* ===== FILTER TABS ===== */
        .tabs {
            display: flex;
            margin: 0 16px 8px;
            background: var(--card);
            border-radius: 16px;
            padding: 4px;
            gap: 4px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            transition: all 0.3s ease;
            color: var(--gray);
            position: relative;
            overflow: hidden;
        }

        .tab.active {
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #000;
            box-shadow: 0 4px 15px rgba(240, 165, 0, 0.4);
            animation: glow 2s infinite;
        }

        /* ===== ANIMALS GRID ===== */
        .animals-container {
            padding: 8px 16px 100px;
            display: grid;
            gap: 14px;
        }

        .animal-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
            border: 2px solid transparent;
            animation: fadeInUp 0.5s ease forwards;
            position: relative;
            overflow: hidden;
        }

        .animal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent, rgba(240,165,0,0.03));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .animal-card:active {
            transform: scale(0.96);
            border-color: var(--gold);
            box-shadow: 0 0 30px rgba(240, 165, 0, 0.3);
        }

        .animal-card:active::before {
            opacity: 1;
        }

        .animal-emoji-box {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, rgba(240,165,0,0.1), rgba(240,165,0,0.05));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 44px;
            flex-shrink: 0;
            transition: transform 0.3s;
            position: relative;
            z-index: 1;
        }

        .animal-card:active .animal-emoji-box {
            transform: rotate(-10deg) scale(1.1);
        }

        .animal-info {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .animal-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .animal-price {
            font-size: 18px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .animal-desc {
            font-size: 12px;
            color: var(--gray);
            line-height: 1.4;
        }

        .animal-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #000;
            font-size: 10px;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
            z-index: 2;
        }

        .badge-new {
            background: linear-gradient(135deg, #00b894, #00cec9);
        }

        .badge-hot {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
        }

        /* ===== BOTTOM BUTTONS ===== */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 12px 16px 20px;
            background: linear-gradient(to top, var(--bg) 60%, transparent);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #000;
            box-shadow: 0 8px 25px rgba(240, 165, 0, 0.4);
        }

        .btn-gold:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(240, 165, 0, 0.6);
        }

        .btn-outline {
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);
        }

        .btn-outline:active {
            background: rgba(240,165,0,0.1);
            transform: scale(0.95);
        }

        /* ===== POPUP ===== */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            width: 90%;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
            animation: fadeInUp 0.4s ease;
        }

        .popup-emoji {
            font-size: 72px;
            animation: float 2s ease-in-out infinite;
        }

        .popup-name {
            font-size: 22px;
            font-weight: 800;
            margin: 12px 0 4px;
        }

        .popup-price {
            font-size: 20px;
            font-weight: 800;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .popup-desc {
            font-size: 13px;
            color: var(--gray);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .popup-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .popup-btn {
            padding: 14px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .popup-btn-book {
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: #000;
        }

        .popup-btn-book:active {
            transform: scale(0.95);
            animation: pulse 0.5s;
        }

        .popup-btn-close {
            background: transparent;
            color: var(--gray);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ===== RIpple Effect ===== */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            animation: ripple 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple {
            to { transform: scale(4); opacity: 0; }
        }

        /* ===== LOADING ===== */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(240,165,0,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <span class="header-logo">🐾</span>
        <div class="header-title">Animal Rent</div>
        <div class="header-subtitle">● Аренда животных ● Россия ●</div>
    </div>

    <!-- STATS -->
    <div class="stats-bar">
        <div class="stat-item">
            <div class="stat-number">8+</div>
            <div class="stat-label">Животных</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">500+</div>
            <div class="stat-label">Клиентов</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">4.9★</div>
            <div class="stat-label">Рейтинг</div>
        </div>
        <div class="stat-item">
            <div class="stat-number">24/7</div>
            <div class="stat-label">Работаем</div>
        </div>
    </div>

    <!-- FILTER TABS -->
    <div class="tabs">
        <div class="tab active" onclick="filterAnimals('all', this)">🌟 Все</div>
        <div class="tab" onclick="filterAnimals('base', this)">🐾 Наши</div>
        <div class="tab" onclick="filterAnimals('user', this)">🏠 Пользователи</div>
    </div>

    <!-- ANIMALS -->
    <div class="animals-container" id="animalsContainer">
        <div class="loading">
            <div class="loading-spinner"></div>
            <div style="color:#9e9e9e">Загрузка каталога...</div>
        </div>
    </div>

    <!-- BOTTOM BAR -->
    <div class="bottom-bar">
        <button class="btn btn-outline" onclick="openBotChat()">
            💬 Чат с ботом
        </button>
        <button class="btn btn-gold" onclick="quickBook()">
            📞 Быстрая заявка
        </button>
    </div>

    <!-- HIDDEN POPUP -->
    <div class="popup-overlay" id="popup" style="display:none;">
        <div class="popup">
            <div class="popup-emoji" id="popEmoji">🐴</div>
            <div class="popup-name" id="popName">Лошадь</div>
            <div class="popup-price" id="popPrice">5 000 ₽ / час</div>
            <div class="popup-desc" id="popDesc">Описание</div>
            <div class="popup-buttons">
                <button class="popup-btn popup-btn-book" id="popBookBtn" onclick="confirmBook()">
                    📅 Забронировать сейчас
                </button>
                <button class="popup-btn popup-btn-close" onclick="closePopup()">
                    ✕ Закрыть
                </button>
            </div>
        </div>
    </div>

    <script>
        // ===== INIT =====
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.setHeaderColor('#0f0f1a');
        tg.setBackgroundColor('#0f0f1a');

        const animals = [
            { id: 'ot', emoji: '🐴', name: 'Лошадь', price: '5 000 ₽ / час', desc: 'Красивая белая лошадь для фотосессий и мероприятий', category: 'base', badge: '🔥 Хит' },
            { id: 'quyon', emoji: '🐰', name: 'Кролик', price: '1 500 ₽ / час', desc: 'Милый декоративный кролик для детских праздников', category: 'base', badge: '' },
            { id: 'ilon', emoji: '🐍', name: 'Змея', price: '3 000 ₽ / час', desc: 'Безопасная змея для экстремальных фотосессий', category: 'base', badge: '🆕 Новинка' },
            { id: 'kabutar', emoji: '🕊️', name: 'Голубь', price: '1 000 ₽ / час', desc: 'Белые голуби для свадеб и торжеств', category: 'base', badge: '' },
            { id: 'mushuk', emoji: '🐱', name: 'Кошка', price: '2 000 ₽ / час', desc: 'Породистая кошка для рекламы и съемок', category: 'base', badge: '' },
            { id: 'kuchuk', emoji: '🐕', name: 'Собака', price: '2 500 ₽ / час', desc: 'Дрессированная собака для любых мероприятий', category: 'base', badge: '🔥 Хит' },
            { id: 'maymun', emoji: '🐒', name: 'Обезьяна', price: '4 000 ₽ / час', desc: 'Ручная обезьяна для детских праздников', category: 'base', badge: '' },
            { id: 'tulki', emoji: '🦊', name: 'Лиса', price: '3 500 ₽ / час', desc: 'Ручная лиса для уникальных фотосессий', category: 'base', badge: '⭐ Топ' }
        ];

        let selectedAnimalId = null;
        let currentFilter = 'all';

        // ===== RENDER =====
        function renderAnimals(filter = 'all') {
            const container = document.getElementById('animalsContainer');
            const filtered = filter === 'all' ? animals : animals.filter(a => a.category === filter);

            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#9e9e9e;">😔 Нет животных в этой категории</div>';
                return;
            }

            container.innerHTML = filtered.map((a, index) => `
                <div class="animal-card" onclick="showPopup('${a.id}')" style="animation-delay:${index * 0.08}s">
                    ${a.badge ? `<div class="animal-badge ${a.badge.includes('Новинка') ? 'badge-new' : a.badge.includes('Хит') ? 'badge-hot' : ''}">${a.badge}</div>` : ''}
                    <div class="animal-emoji-box">${a.emoji}</div>
                    <div class="animal-info">
                        <div class="animal-name">${a.name}</div>
                        <div class="animal-price">${a.price}</div>
                        <div class="animal-desc">${a.desc}</div>
                    </div>
                </div>
            `).join('');
        }

        // ===== FILTER =====
        function filterAnimals(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderAnimals(filter);
        }

        // ===== POPUP =====
        function showPopup(id) {
            const animal = animals.find(a => a.id === id);
            if (!animal) return;

            selectedAnimalId = id;
            document.getElementById('popEmoji').textContent = animal.emoji;
            document.getElementById('popName').textContent = animal.name;
            document.getElementById('popPrice').textContent = animal.price;
            document.getElementById('popDesc').textContent = animal.desc;
            document.getElementById('popup').style.display = 'flex';

            // Haptic
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function closePopup() {
            document.getElementById('popup').style.display = 'none';
            selectedAnimalId = null;
        }

        function confirmBook() {
            if (!selectedAnimalId) return;

            // Ripple effect
            const btn = document.getElementById('popBookBtn');
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => btn.style.transform = 'scale(1)', 150);

            // Send to bot
            tg.sendData(JSON.stringify({
                action: 'book',
                animal: selectedAnimalId
            }));

            // Haptic
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            // Close
            setTimeout(() => {
                document.getElementById('popup').style.display = 'none';
                tg.close();
            }, 300);
        }

        function quickBook() {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            tg.sendData(JSON.stringify({
                action: 'open_booking'
            }));
            tg.close();
        }

        function openBotChat() {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
            tg.openTelegramLink('https://t.me/ZooRent_bot');
        }

        // Close popup on overlay click
        document.getElementById('popup').addEventListener('click', function(e) {
            if (e.target === this) closePopup();
        });

        // Keyboard ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closePopup();
        });

        // ===== INIT RENDER =====
        setTimeout(() => renderAnimals(), 300);

        console.log('🐾 Animal Rent Mini App Ready');
        console.log('✅ v2.0 Ultra Design');
    </script>
</body>
</html>
